<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTA Botones — RocoMadrid</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #2e2e2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .cta-wrapper {
      display: flex;
      flex-direction: row;
      gap: 24px;
      justify-content: center;
      align-items: stretch;
      flex-wrap: wrap;
    }

    .cta-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 400px;
      min-height: 130px;
      padding: 28px 32px;
      border-radius: 20px;
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 17px;
      line-height: 1.3;
      letter-spacing: 0.02em;
      text-align: center;
      color: #fff;
      border: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    /* Botón primario — dorado */
    .cta-btn--primary {
      background: linear-gradient(135deg, #d4a017 0%, #b8870f 100%);
      box-shadow: 0 8px 28px rgba(212, 160, 23, 0.45);
    }
    .cta-btn--primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(212, 160, 23, 0.6);
      filter: brightness(1.08);
    }
    .cta-btn--primary:active {
      transform: translateY(0px);
    }

    /* Botón secundario — carbón oscuro */
    .cta-btn--secondary {
      background: linear-gradient(135deg, #4a4a4a 0%, #333333 100%);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
      border: 2px solid rgba(255, 255, 255, 0.12);
    }
    .cta-btn--secondary:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.55);
      border-color: rgba(212, 160, 23, 0.5);
      filter: brightness(1.1);
    }
    .cta-btn--secondary:active {
      transform: translateY(0px);
    }

    .cta-btn__icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .cta-btn__text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cta-btn__label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .cta-btn__title {
      font-size: 17px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 1.25;
    }

    /* Responsive: en móvil, uno encima del otro */
    @media (max-width: 880px) {
      .cta-wrapper {
        flex-direction: column;
        align-items: center;
      }
      .cta-btn {
        width: 100%;
        max-width: 400px;
      }
    }
  </style>
</head>
<body>

  <div class="cta-wrapper">

    <!-- Botón 1: Ven a escalar -->
    <a href="https://rocomadrid.com/actividades" class="cta-btn cta-btn--primary">
      <svg class="cta-btn__icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Climbing figure icon -->
        <circle cx="28" cy="7" r="3.5" fill="white"/>
        <!-- Body -->
        <path d="M28 10.5 L24 18 L18 22 M28 10.5 L30 19 L35 24" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Legs -->
        <path d="M24 18 L20 28 M30 19 L32 29" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        <!-- Wall / holds -->
        <rect x="8" y="10" width="6" height="4" rx="2" fill="white" opacity="0.4"/>
        <rect x="6" y="22" width="5" height="4" rx="2" fill="white" opacity="0.4"/>
        <rect x="9" y="32" width="6" height="4" rx="2" fill="white" opacity="0.4"/>
        <!-- Wall line -->
        <line x1="15" y1="6" x2="15" y2="40" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
        <!-- Arrow up right -->
        <path d="M36 14 L40 10 M36 10 L40 10 L40 14" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
      </svg>
      <div class="cta-btn__text">
        <span class="cta-btn__label">Rocódromo · Madrid</span>
        <span class="cta-btn__title">Ven a escalar<br>con nosotros</span>
      </div>
    </a>

    <!-- Botón 2: Apúntate a clases -->
    <a href="https://rocomadrid.com/actividades/clases-de-escalada" class="cta-btn cta-btn--secondary">
      <svg class="cta-btn__icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Graduation / class icon -->
        <!-- Book base -->
        <rect x="6" y="14" width="24" height="20" rx="3" fill="white" opacity="0.15" stroke="white" stroke-width="1.8"/>
        <!-- Book pages line -->
        <line x1="18" y1="14" x2="18" y2="34" stroke="white" stroke-width="1.5" opacity="0.5"/>
        <!-- Text lines on left -->
        <line x1="9" y1="19" x2="15" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="9" y1="23" x2="15" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="9" y1="27" x2="15" y2="27" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
        <!-- Text lines on right -->
        <line x1="21" y1="19" x2="27" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="21" y1="23" x2="27" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
        <!-- Graduation cap on top right -->
        <polygon points="32,9 38,12 32,15 26,12" fill="#d4a017" stroke="#d4a017" stroke-width="0.5" stroke-linejoin="round"/>
        <path d="M35.5 12.8 L35.5 17.5" stroke="#d4a017" stroke-width="2" stroke-linecap="round"/>
        <path d="M34 17.5 Q35.5 19 37 17.5" stroke="#d4a017" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        <!-- Person silhouette below cap -->
        <circle cx="32" cy="6.5" r="2" fill="white" opacity="0.8"/>
      </svg>
      <div class="cta-btn__text">
        <span class="cta-btn__label">Para todos los niveles</span>
        <span class="cta-btn__title">Apúntate a<br>nuestras clases</span>
      </div>
    </a>

  </div>

</body>
</html>
