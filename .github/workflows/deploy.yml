name: 🚀 Deploy to Production (SiteGround)

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy dist/assets/ to SiteGround
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./dist/assets/
          server-dir: ${{ secrets.SFTP_REMOTE_PATH }}assets/
          dangerous-clean-slate: false
          security: loose

      - name: Upload PHP files via FTPS
        run: |
          curl -k --ssl-reqd \
            --user "${{ secrets.SFTP_USERNAME }}:${{ secrets.SFTP_PASSWORD }}" \
            -T server-index.php \
            "ftp://${{ secrets.SFTP_HOST }}:21${{ secrets.SFTP_REMOTE_PATH }}index.php"
          curl -k --ssl-reqd \
            --user "${{ secrets.SFTP_USERNAME }}:${{ secrets.SFTP_PASSWORD }}" \
            -T progreso-extension1-1.php \
            "ftp://${{ secrets.SFTP_HOST }}:21${{ secrets.SFTP_PLUGIN_PATH }}progreso-extension1-1.php"
