name: 🚀 Deploy to Production (SiteGround)

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy dist/assets/ to SiteGround
        env:
          FTP_HOST: ${{ secrets.SFTP_HOST }}
          FTP_USER: ${{ secrets.SFTP_USERNAME }}
          FTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          FTP_PATH: ${{ secrets.SFTP_REMOTE_PATH }}
        run: |
          echo "=== dist/assets/ contents ==="
          ls -la dist/assets/
          for f in dist/assets/*; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            url="ftp://$FTP_HOST:21${FTP_PATH}assets/$fname"
            echo "Uploading $fname → $url"
            curl -v -k --ssl-reqd --ftp-create-dirs --fail \
              --user "$FTP_USER:$FTP_PASS" \
              -T "$f" \
              "$url" || { echo "FAILED uploading $fname (exit $?)"; exit 1; }
            echo "OK: $fname"
          done

      - name: Upload PHP files
        env:
          FTP_HOST: ${{ secrets.SFTP_HOST }}
          FTP_USER: ${{ secrets.SFTP_USERNAME }}
          FTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          FTP_PATH: ${{ secrets.SFTP_REMOTE_PATH }}
          PLUGIN_PATH: ${{ secrets.SFTP_PLUGIN_PATH }}
        run: |
          curl -k --ssl-reqd \
            --user "$FTP_USER:$FTP_PASS" \
            -T server-index.php \
            "ftp://$FTP_HOST:21${FTP_PATH}index.php"
          curl -k --ssl-reqd \
            --user "$FTP_USER:$FTP_PASS" \
            -T progreso-extension1-1.php \
            "ftp://$FTP_HOST:21${PLUGIN_PATH}progreso-extension1-1.php"
