name: 🚀 Deploy to Production (SiteGround)

# Triggers on every push to master
on:
  push:
    branches:
      - master

  # Also allows manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy via SFTP
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout the code ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Set up Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ─── 4. Build the Vite/React app ───────────────────────────────────────
      # vite.config.js → outDir: 'dist' (confirmed)
      - name: Build app
        run: npm run build
        env:
          NODE_ENV: production

      # ─── 5. Deploy via SFTP ────────────────────────────────────────────────
      - name: Deploy to SiteGround via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}

          # Uploads the built app (dist/ folder contents)
          local_path: './dist/*'

          # ⚠️ Set SFTP_REMOTE_PATH in GitHub Secrets before pushing!
          # Should point to the blokes-dev/ subfolder on your server
          # e.g. /home/youraccount/public_html/blokes-dev/
          remote_path: ${{ secrets.SFTP_REMOTE_PATH }}

          sftpArgs: '-o ConnectTimeout=10'
          delete_remote_files: false
