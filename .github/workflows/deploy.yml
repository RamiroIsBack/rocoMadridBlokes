name: 🚀 Deploy (SiteGround)

# master → blokes  (producción)   — requiere secret SFTP_REMOTE_PATH_PROD
# dev    → blokes-dev (desarrollo) — usa secret SFTP_REMOTE_PATH

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set FTP path and slug from branch
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            RAW="${{ secrets.SFTP_REMOTE_PATH_PROD }}"
            echo "APP_SLUG=blokes"     >> $GITHUB_ENV
          else
            RAW="${{ secrets.SFTP_REMOTE_PATH }}"
            echo "APP_SLUG=blokes-dev" >> $GITHUB_ENV
          fi
          # Ensure trailing slash
          echo "FTP_PATH=${RAW%/}/" >> $GITHUB_ENV

      - name: Deploy dist/assets/ to SiteGround
        env:
          FTP_HOST: ${{ secrets.SFTP_HOST }}
          FTP_USER: ${{ secrets.SFTP_USERNAME }}
          FTP_PASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          # ── 1. Borrar ficheros viejos en assets/ del servidor ──────────────
          echo "=== Limpiando assets/ antiguos en el servidor (${FTP_PATH}assets/) ==="
          listing=$(curl -sk --ssl-reqd \
            --user "$FTP_USER:$FTP_PASS" \
            "ftp://$FTP_HOST:21${FTP_PATH}assets/" 2>/dev/null || true)
          while IFS= read -r line; do
            fname=$(echo "$line" | awk '{print $NF}' | tr -d '\r')
            [ -z "$fname" ] && continue
            echo "Borrando: $fname"
            curl -sk --ssl-reqd \
              --user "$FTP_USER:$FTP_PASS" \
              -Q "DELE ${FTP_PATH}assets/$fname" \
              "ftp://$FTP_HOST:21/" || true
          done <<< "$listing"

          # ── 2. Subir nuevos assets ─────────────────────────────────────────
          echo "=== Subiendo dist/assets/ ==="
          ls -la dist/assets/
          for f in dist/assets/*; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            url="ftp://$FTP_HOST:21${FTP_PATH}assets/$fname"
            echo "Uploading $fname → $url"
            curl -sk --ssl-reqd --ftp-create-dirs --fail \
              --user "$FTP_USER:$FTP_PASS" \
              -T "$f" \
              "$url" || { echo "FAILED: $fname (exit $?)"; exit 1; }
            echo "OK: $fname"
          done

      - name: Upload PHP files and .htaccess
        env:
          FTP_HOST: ${{ secrets.SFTP_HOST }}
          FTP_USER: ${{ secrets.SFTP_USERNAME }}
          FTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          PLUGIN_PATH: ${{ secrets.SFTP_PLUGIN_PATH }}
        run: |
          # Eliminar index.html antiguo si existe (instalaciones previas estáticas)
          curl -sk --ssl-reqd \
            --user "$FTP_USER:$FTP_PASS" \
            -Q "DELE ${FTP_PATH}index.html" \
            "ftp://$FTP_HOST:21/" || true

          # index.php
          curl -k --ssl-reqd \
            --user "$FTP_USER:$FTP_PASS" \
            -T server-index.php \
            "ftp://$FTP_HOST:21${FTP_PATH}index.php"

          # .htaccess — sustituir slug según rama
          sed "s|RewriteBase /blokes-dev/|RewriteBase /$APP_SLUG/|" \
            public/.htaccess > /tmp/htaccess-deploy
          curl -k --ssl-reqd \
            --user "$FTP_USER:$FTP_PASS" \
            -T /tmp/htaccess-deploy \
            "ftp://$FTP_HOST:21${FTP_PATH}.htaccess"

          # Plugin
          curl -k --ssl-reqd \
            --user "$FTP_USER:$FTP_PASS" \
            -T progreso-extension1-1.php \
            "ftp://$FTP_HOST:21${PLUGIN_PATH}progreso-extension1-1.php"
